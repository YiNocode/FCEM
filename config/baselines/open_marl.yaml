# OPEN MARL (Chen et al.) — 2D point-mass adaptation hyperparameters

n_pursuers: 3
history_step: 10
future_prediction_step: 5
obs_max_obstacles: 3
mask_value: -5.0
arena_scale: 40.0

checkpoint_path: checkpoints/open_marl/default.pt
device: cpu
deterministic: true

reward:
  capture_reward: 6.0
  distance_coef: 0.1
  collision_penalty: 10.0
  smoothness_coef: 0.01
  safety_margin: 0.15

mappo:
  train_every: 64
  num_minibatches: 16
  ppo_epochs: 4
  tp_epochs: 1
  clip_param: 0.1
  entropy_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.995
  max_grad_norm: 10.0
  normalize_advantages: true
  actor_lr: 0.0005
  critic_lr: 0.0005
  epn_loss_coef: 1.0

training:
  n_envs: 32
  total_steps: 500000
  # RL 训练用较短 episode（FCEM 对比实验仍为 max_steps=1200）
  episode_max_steps: 1000
  scenarios:
    - free
    - random_obstacles
    - single_exit
  log_every: 1000
  # global_step = 所有并行 env 的步数之和；默认约每轮 episode 评估一次
  eval_every: null
  eval_episodes: 32
  seed: 42

network:
  hidden_units: [256, 256, 256]
  lstm_hidden: 128
  n_attn_heads: 4

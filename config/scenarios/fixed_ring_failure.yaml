name: fixed_ring_failure
description: |
  Asymmetric fast-breakaway: three pursuers cluster on the west, evader is
  faster (v_e=7.5 > v_p=3.0) and escapes east. fixed_ring keeps shrinking
  without structure guard — pursuers stay on one side (G_max ~ 350°) and
  never satisfy the angular closure capture condition. FCEM blocks with
  escape-aware manifold + guarded contraction + sync assignment.

obstacles: []

# Demo uses APF evader (geometry-only failure); suite default is evader_policy: game
evader_policy: apf

# Scenario-specific dynamics (merged into run config by load_config).
dynamics:
  pursuer_vmax: 3.0
  pursuer_amax: 2.5
  evader_vmax: 7.5
  evader_amax: 3.0

init:
  evader: [15.0, 20.0]
  evader_v: [5.0, 2.0]
  pursuers:
    - [5.0, 10.0]
    - [5.0, 30.0]
    - [8.0, 20.0]
  pursuer_v:
    - [0.5, 0.5]
    - [0.5, -0.5]
    - [0.8, 0.0]
